<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="hud-height">0 m</div>
    <div
      id="milestone-popup"
      hidden
    ></div>
    <div
      id="pause-overlay"
      hidden
    >
      <p id="pause-title">PAUSED</p>
      <span id="pause-hint">ESC — resume</span>
    </div>
    <div
      id="game-over"
      hidden
    >
      <div id="game-over-panel">
        <h1 id="game-over-title">GAME OVER</h1>
        <div id="game-over-score">
          <span id="game-over-label">DISTANCE</span>
          <span id="game-over-height">0 m</span>
        </div>
        <div id="game-over-actions">
          <button
            id="game-over-rewind"
            type="button"
          >
            RETURN TO PLATFORM
          </button>
          <button
            id="game-over-restart"
            type="button"
          >
            START OVER
          </button>
        </div>
      </div>
    </div>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
