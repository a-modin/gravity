<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="hud-height">0 м</div>
    <div
      id="milestone-popup"
      hidden
    ></div>
    <div id="hud">Потяни квадрат вниз и отпусти, чтобы запустить</div>
    <div
      id="pause-overlay"
      hidden
    >
      <p id="pause-title">ПАУЗА</p>
      <span id="pause-hint">ESC — продолжить</span>
    </div>
    <div
      id="game-over"
      hidden
    >
      <div
        id="game-over-backdrop"
        aria-hidden="true"
      >
        <div class="game-over-lava"></div>
        <div class="game-over-embers"></div>
        <div class="game-over-platform"></div>
      </div>
      <div id="game-over-panel">
        <h1 id="game-over-title">GAME OVER</h1>
        <div
          id="game-over-divider"
          aria-hidden="true"
        >
          <span class="game-over-divider-line"></span>
          <span class="game-over-divider-diamond"></span>
          <span class="game-over-divider-line"></span>
        </div>
        <div id="game-over-score-card">
          <span class="game-over-star">✦</span>
          <div class="game-over-score-content">
            <span id="game-over-label">ПРОЙДЕНО</span>
            <span id="game-over-height">0 м</span>
          </div>
          <span class="game-over-star">✦</span>
        </div>
        <div id="game-over-actions">
          <button
            id="game-over-rewind"
            type="button"
          >
            <span
              class="game-over-btn-icon"
              aria-hidden="true"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                fill="none"
              >
                <path
                  d="M12 4H5V11H7.5C8.4 8.6 10.6 7 13 7C16.3 7 19 9.7 19 13C19 16.3 16.3 19 13 19C10.2 19 7.8 17.2 6.8 14.8H4.2C5.4 18.4 8.9 21 13 21C17.4 21 21 17.4 21 13C21 8.6 17.4 5 13 5C10.1 5 7.5 6.5 6 8.7V4H12Z"
                  fill="currentColor"
                />
              </svg>
            </span>
            <span class="game-over-btn-text">ВЕРНУТЬСЯ НА ПЛАТФОРМУ</span>
          </button>
          <button
            id="game-over-restart"
            type="button"
          >
            <span
              class="game-over-btn-icon"
              aria-hidden="true"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 18 18"
                fill="none"
              >
                <path
                  d="M14 4V7H11.5C10.7 5.2 8.9 4 7 4C4.2 4 2 6.2 2 9C2 11.8 4.2 14 7 14C9.1 14 10.9 12.6 11.6 10.8H14.2C13.4 13.8 10.5 16 7 16C3.1 16 0 12.9 0 9C0 5.1 3.1 2 7 2C9.5 2 11.7 3.3 13 5.3V2H14Z"
                  fill="currentColor"
                />
              </svg>
            </span>
            <span class="game-over-btn-text">НАЧАТЬ ЗАНОВО</span>
          </button>
        </div>
      </div>
    </div>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
