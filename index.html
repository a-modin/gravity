<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gravity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/onboarding.css" />
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  </head>
  <body>
    <div id="hud-player-wrap">
      <div
        id="hud-player"
        hidden
      ></div>
    </div>
    <div id="hud-right">
      <div id="hud-height">0 m</div>
      <div
        id="hud-leaderboard"
        hidden
      ></div>
    </div>
    <button
      id="music-toggle"
      type="button"
      aria-pressed="true"
    >
      MUSIC
    </button>
    <div
      id="milestone-popup"
      hidden
    ></div>
    <div
      id="pause-overlay"
      hidden
    >
      <p id="pause-title">PAUSED</p>
      <button
        id="pause-resume"
        type="button"
      >
        RESUME
      </button>
      <span id="pause-hint">ESC — resume</span>
    </div>
    <div
      id="game-over"
      hidden
    >
      <div id="game-over-panel">
        <h1 id="game-over-title">GAME OVER</h1>
        <div id="game-over-score">
          <span id="game-over-label">DISTANCE</span>
          <span id="game-over-height">0 m</span>
        </div>
        <div id="game-over-actions">
          <button
            id="game-over-rewind"
            type="button"
          >
            RETURN TO PLATFORM
          </button>
          <button
            id="game-over-restart"
            type="button"
          >
            START OVER
          </button>
        </div>
      </div>
    </div>
    <div
      id="leaderboard-overlay"
      hidden
    >
      <div id="leaderboard-panel">
        <h2 id="leaderboard-title">LEADERBOARD</h2>
        <p
          id="leaderboard-status"
          hidden
        ></p>
        <div id="leaderboard-table-wrap">
          <table id="leaderboard-table">
            <thead>
              <tr>
                <th id="leaderboard-col-rank">#</th>
                <th id="leaderboard-col-player">PLAYER</th>
                <th id="leaderboard-col-score">HEIGHT</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div
      id="start-overlay"
    >
      <div id="start-panel">
        <h1 id="start-title">Gravity</h1>
        <p id="start-loading">Loading...</p>
        <button
          id="start-play"
          type="button"
          hidden
        >
          START
        </button>
      </div>
    </div>
    <div
      id="onboarding-overlay"
      hidden
    >
      <div id="onboarding-gesture">
        <div id="onboarding-pull-line"></div>
        <img
          id="onboarding-hand"
          alt=""
          draggable="false"
        />
      </div>
      <div id="onboarding-panel">
        <p id="onboarding-hint">Pull down and release to jump higher</p>
        <button
          id="onboarding-dismiss"
          type="button"
        >
          GOT IT
        </button>
      </div>
    </div>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
